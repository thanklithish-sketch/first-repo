name: Python ci

on:
 push:
 pull_request:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name : Run script
      run: python demo.py
